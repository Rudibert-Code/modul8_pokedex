<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <script src="./script.js"></script>
    <script src="./scripts/cards-template.js"></script>
    <script src="./scripts/loading-bar.js"></script>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/background-types.css">
</head>
<body onload="init()">
    <header>
        <section class="header-container">
            <section class="search-bar">
                <dialog open class="suggestions-dialog" id="search-suggestions"></dialog>
                <section class="search-bar-input">
                    <input type="text" id="search-bar-input" onkeyup="getSuggestions()">
                </section>
                <p class="search-bar-btn" onclick="searchPokemon()">Search</p>
            </section>
        </section>
        <nav></nav>
    </header>
    <main>
        <audio id="pokemonAudio"></audio>
        <dialog class="loading-icon" id="loading"></dialog>
        <dialog class="detail-viewer-container" id="detail-viewer">
        </dialog>
        <section class="main-container" id="main-container">
        </section>
        <a class="pokemon-header btn-a" onclick="fetchData()"><p id="next-min"></p> - <p id="next-max"></p></a>
    </main>
    <footer></footer>
</body>
</html>
