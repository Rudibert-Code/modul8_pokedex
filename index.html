<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="icon" type="image" href="./assets/icons/pokeballicon.png">
    <script src="./script.js"></script>
    <script src="./scripts/cards-template.js"></script>
    <script src="./scripts/loading-bar.js"></script>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/background-types.css">
</head>
<body onload="init()">
    <header>
        <section class="header-container">
            <div class="title">
                <img class="title-img" src="./assets/icons/pokeballicon.png">
                <h1>Pokédex</h1>
            </div>
        </section>
            <section class="search-bar" id="search-bar-container">
                <section class="search-bar-input">
                    <input type="text" id="search-bar-input" onkeyup="getSuggestions()">
                    <dialog class="suggestions-dialog" id="search-suggestions"></dialog>
                </section>
                <img src="./assets/icons/icon-search.png" class="search-bar-btn search-bar-icon" onclick="searchPokemon()">
            </section>
        <nav></nav>
    </header>
    <main>
        <audio id="pokemonAudio"></audio>
        <dialog id="error-message">
            <div class="error-message-dialog">
                <P class="error-message-text">This Pokémon is not amog the list loaded.</P>
                <a class="pokemon-header btn-a" onclick="fetchData()"><p id="error-next-min"></p> - <p id="error-next-max"></p></a>
            </div>
        </dialog>
        <dialog class="loading-icon" id="loading"></dialog>
        <dialog class="detail-viewer-container" id="detail-viewer">
        </dialog>
        <section class="main-container" id="main-container">
        </section>
        <a class="pokemon-header btn-a" onclick="fetchData()"><p id="next-min"></p> - <p id="next-max"></p></a>
    </main>
    <footer>
        <img src="./assets/icons/logo-dev.png">
    </footer>
</body>
</html>
